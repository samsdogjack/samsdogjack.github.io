<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0D1B2E"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow orb -->
  <ellipse cx="320" cy="280" rx="340" ry="280" fill="url(#glowBlue)" opacity="0.6"/>

  <!-- Grid lines -->
  <g stroke="#0A84FF" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Terminal window decoration -->
  <rect x="680" y="120" width="460" height="320" rx="12" fill="#141820" stroke="#0A84FF" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- Terminal titlebar -->
  <rect x="680" y="120" width="460" height="38" rx="12" fill="#1A1F2E"/>
  <rect x="680" y="145" width="460" height="13" fill="#1A1F2E"/>
  <!-- Dots -->
  <circle cx="710" cy="139" r="6" fill="#FF5F57"/>
  <circle cx="732" cy="139" r="6" fill="#FEBC2E"/>
  <circle cx="754" cy="139" r="6" fill="#28C840"/>
  <!-- Terminal content -->
  <text x="706" y="192" font-family="'Courier New', monospace" font-size="15" fill="#0A84FF" opacity="0.9">$ brew install neofetch</text>
  <text x="706" y="220" font-family="'Courier New', monospace" font-size="15" fill="#4CAF50" opacity="0.8">==> Fetching neofetch</text>
  <text x="706" y="248" font-family="'Courier New', monospace" font-size="15" fill="#cdd6f4" opacity="0.6">==> Installing neofetch</text>
  <text x="706" y="276" font-family="'Courier New', monospace" font-size="15" fill="#cdd6f4" opacity="0.6">🍺 neofetch installed!</text>
  <text x="706" y="316" font-family="'Courier New', monospace" font-size="15" fill="#0A84FF" opacity="0.9">$ brew --version</text>
  <text x="706" y="344" font-family="'Courier New', monospace" font-size="15" fill="#cdd6f4" opacity="0.6">Homebrew 4.2.0</text>
  <text x="706" y="384" font-family="'Courier New', monospace" font-size="15" fill="#0A84FF" filter="url(#glow)">$ <tspan fill="#cdd6f4">_</tspan></text>

  <!-- Accent line -->
  <rect x="80" y="178" width="5" height="130" rx="3" fill="#0A84FF" filter="url(#glow)"/>

  <!-- Main title -->
  <text x="108" y="240" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Hello</text>
  <text x="108" y="338" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" fill="#0A84FF" letter-spacing="-2" filter="url(#softGlow)">World</text>

  <!-- Subtitle -->
  <text x="108" y="390" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="24" fill="#8899AA" letter-spacing="1">Getting started with HomeLab</text>

  <!-- Tag chips -->
  <rect x="108" y="420" width="108" height="32" rx="16" fill="#0A84FF" fill-opacity="0.15" stroke="#0A84FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="162" y="441" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#0A84FF" text-anchor="middle">#homebrew</text>

  <rect x="226" y="420" width="80" height="32" rx="16" fill="#0A84FF" fill-opacity="0.1" stroke="#0A84FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="266" y="441" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#0A84FF" text-anchor="middle">#mac</text>

  <rect x="316" y="420" width="74" height="32" rx="16" fill="#0A84FF" fill-opacity="0.1" stroke="#0A84FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="353" y="441" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#0A84FF" text-anchor="middle">#code</text>

  <!-- Bottom separator line -->
  <line x1="80" y1="575" x2="1120" y2="575" stroke="#0A84FF" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Site name -->
  <text x="1120" y="606" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#0A84FF" fill-opacity="0.5" text-anchor="end" letter-spacing="3">HOMELAB</text>
</svg>
