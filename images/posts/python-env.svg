<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0D1A0D"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </radialGradient>
    <radialGradient id="glowYellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD43B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFD43B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#306998" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#306998" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="pyBlue" x1="12.4809" y1="2" x2="12.4809" y2="22.7407" gradientUnits="userSpaceOnUse">
      <stop stop-color="#327EBD"/>
      <stop offset="1" stop-color="#1565A7"/>
    </linearGradient>
    <linearGradient id="pyYellow" x1="19.519" y1="9.25928" x2="19.519" y2="30" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFDA4B"/>
      <stop offset="1" stop-color="#F9C600"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow orbs -->
  <ellipse cx="900" cy="300" rx="320" ry="260" fill="url(#glowYellow)" opacity="0.7"/>
  <ellipse cx="820" cy="400" rx="220" ry="180" fill="url(#glowBlue2)" opacity="0.6"/>

  <!-- Grid lines -->
  <g stroke="#FFD43B" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Python logo - official mark -->
  <g transform="translate(710, 120) scale(11.875)" opacity="0.95" filter="url(#softGlow)">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M13.0164 2C10.8193 2 9.03825 3.72453 9.03825 5.85185V8.51852H15.9235V9.25926H5.97814C3.78107 9.25926 2 10.9838 2 13.1111L2 18.8889C2 21.0162 3.78107 22.7407 5.97814 22.7407H8.27322V19.4815C8.27322 17.3542 10.0543 15.6296 12.2514 15.6296H19.5956C21.4547 15.6296 22.9617 14.1704 22.9617 12.3704V5.85185C22.9617 3.72453 21.1807 2 18.9836 2H13.0164ZM12.0984 6.74074C12.8589 6.74074 13.4754 6.14378 13.4754 5.40741C13.4754 4.67103 12.8589 4.07407 12.0984 4.07407C11.3378 4.07407 10.7213 4.67103 10.7213 5.40741C10.7213 6.14378 11.3378 6.74074 12.0984 6.74074Z" fill="url(#pyBlue)"/>
    <path fill-rule="evenodd" clip-rule="evenodd" d="M18.9834 30C21.1805 30 22.9616 28.2755 22.9616 26.1482V23.4815L16.0763 23.4815L16.0763 22.7408L26.0217 22.7408C28.2188 22.7408 29.9998 21.0162 29.9998 18.8889V13.1111C29.9998 10.9838 28.2188 9.25928 26.0217 9.25928L23.7266 9.25928V12.5185C23.7266 14.6459 21.9455 16.3704 19.7485 16.3704L12.4042 16.3704C10.5451 16.3704 9.03809 17.8296 9.03809 19.6296L9.03809 26.1482C9.03809 28.2755 10.8192 30 13.0162 30H18.9834ZM19.9015 25.2593C19.1409 25.2593 18.5244 25.8562 18.5244 26.5926C18.5244 27.329 19.1409 27.9259 19.9015 27.9259C20.662 27.9259 21.2785 27.329 21.2785 26.5926C21.2785 25.8562 20.662 25.2593 19.9015 25.2593Z" fill="url(#pyYellow)"/>
  </g>

  <!-- Accent line -->
  <rect x="80" y="155" width="5" height="150" rx="3" fill="#FFD43B" filter="url(#glow)"/>

  <!-- Main title line 1 -->
  <text x="108" y="230" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#FFD43B" letter-spacing="-2" filter="url(#softGlow)">Python</text>
  <!-- Main title line 2 -->
  <text x="108" y="318" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Virtual</text>
  <text x="108" y="400" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#306998" letter-spacing="-2" filter="url(#softGlow)">Environments</text>

  <!-- Subtitle -->
  <text x="108" y="448" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#7A8A9A" letter-spacing="1">Setup guide for Mac</text>

  <!-- Command snippets -->
  <rect x="108" y="470" width="390" height="36" rx="8" fill="#1A1F0A" stroke="#FFD43B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="126" y="493" font-family="'Courier New', monospace" font-size="15" fill="#FFD43B" opacity="0.9">$ python3 -m venv venv</text>

  <!-- Bottom separator line -->
  <line x1="80" y1="575" x2="1120" y2="575" stroke="#FFD43B" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Site name -->
  <text x="1120" y="606" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#FFD43B" fill-opacity="0.4" text-anchor="end" letter-spacing="3">HOMELAB</text>
</svg>
